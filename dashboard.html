<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Test</title>
</head>
<body>
  <h1 id="status">Loading...</h1>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDwjWf-ProLswPM-u84V1fRhpY0xZS9tB8",
      authDomain: "lsrta-portal.firebaseapp.com",
      databaseURL: "https://lsrta-portal-default-rtdb.firebaseio.com",
      projectId: "lsrta-portal",
      storageBucket: "lsrta-portal.firebasestorage.app",
      messagingSenderId: "29459242340",
      appId: "1:29459242340:web:a15cc3ada8fad299816e71"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    onAuthStateChanged(auth, user => {
      if (!user) {
        document.getElementById('status').textContent = 'Not logged in - redirecting...';
        window.location.href = 'index.html';
      } else {
        document.getElementById('status').textContent = 'Hello ' + user.displayName + '! Dashboard works!';
      }
    });
  </script>
</body>
</html>
